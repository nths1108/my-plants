<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>綠植管家 - 視覺化澆水提醒</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="綠植管家">
    <style>
        :root {
            --primary: #2ecc71;
            --danger: #e74c3c;
            --info: #3498db;
            --bg: #f8f9fa;
        }
        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
            touch-action: none;
            padding-bottom: env(safe-area-inset-bottom);
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .btn { 
            pointer-events: auto; border: none; padding: 12px 24px; border-radius: 25px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-main { background: var(--primary); color: white; }
        
        .btn-group { 
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); display: flex; gap: 15px; 
        }
        
        .batch-panel { 
            position: fixed; top: calc(20px + env(safe-area-inset-top)); 
            left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: none; flex-direction: column; 
            align-items: center; gap: 10px; z-index: 100; pointer-events: auto; width: 85%; max-width: 420px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        #fileInput { display: none; }

        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 20px; display: none; 
            z-index: 200; pointer-events: auto; width: 85%; max-width: 320px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
        }
        .modal h3 { margin-top: 0; color: #2c3e50; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; -webkit-appearance: none; }
        .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        #emptyState {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #95a5a6; pointer-events: none; width: 80%;
        }
        .toast-msg { bottom: calc(100px + env(safe-area-inset-bottom)) !important; }
    </style>
</head>
<body>

<canvas id="plantCanvas"></canvas>

<div id="emptyState">
    <div style="font-size: 50px;">🌿</div>
    <h2>尚未添加植物</h2>
    <p>點擊下方按鈕開始記錄</p>
</div>

<div id="ui-layer">
    <div class="btn-group">
        <button class="btn btn-main" onclick="openAddModal()">＋ 新增植物</button>
    </div>

    <div id="batchPanel" class="batch-panel">
        <b id="batchCount">已選取 0 棵植物</b>
        <div style="display:flex; gap:6px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" style="background:var(--info); color:white; padding:8px 12px; font-size: 14px;" onclick="batchWatering()">💧 批量澆水</button>
            <button class="btn" style="background:#e67e22; color:white; padding:8px 12px; font-size: 14px;" onclick="openBatchFreq()">📅 改頻率</button>
            <button id="undoBtn" class="btn" style="background:#6c5ce7; color:white; padding:8px 12px; font-size: 14px; display:none;" onclick="undoAction()">↺ 復原</button>
            <button class="btn" style="background:var(--danger); color:white; padding:8px 12px; font-size: 14px;" onclick="batchDelete()">🗑️ 刪除</button>
            <button class="btn" style="background:#95a5a6; color:white; padding:8px 12px; font-size: 14px;" onclick="clearSelection()">取消</button>
        </div>
    </div>

    <div id="addModal" class="modal">
        <h3>🌱 新夥伴</h3>
        <input type="text" id="plantName" placeholder="例如：琴葉榕">
        <input type="number" id="plantFreq" value="3" min="1" inputmode="numeric">
        <div class="modal-btns">
            <button class="btn btn-main" onclick="triggerUpload()">📷 上傳照片並儲存</button>
            <button class="btn" style="background:#95a5a6; color:white;" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
/** 1. 資料與儲存 **/
const DB_NAME = "PlantCareDB_v2";
const STORE_NAME = "plants";
let db, plants = [];
let lastSnapshot = null;

const canvas = document.getElementById('plantCanvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
let cardW, cardH, cols, dpr;

// 滾動相關變數
let scrollY = 0;
let isDragging = false;
let startY = 0;
let lastY = 0;
let totalHeight = 0;

async function initDB() {
    return new Promise(resolve => {
        const request = indexedDB.open(DB_NAME, 2);
        request.onupgradeneeded = e => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: "id" });
        };
        request.onsuccess = e => { db = e.target.result; resolve(); };
    });
}

async function loadData() {
    const tx = db.transaction(STORE_NAME, "readonly");
    plants = await new Promise(res => {
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => res(e.target.result || []);
    });
    document.getElementById('emptyState').style.display = plants.length ? 'none' : 'block';
    processAndSort();
    render();
}

function saveData(plant) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put(JSON.parse(JSON.stringify(plant)));
}

async function saveMultipleData(plantsArray) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    plantsArray.forEach(p => store.put(JSON.parse(JSON.stringify(p))));
}

function deleteFromDB(id) {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).delete(id);
}

/** 2. 核心邏輯 **/
function processAndSort() {
    const now = Date.now();
    plants.forEach(p => {
        p.thirstIndex = (now - p.lastWatered) / (p.freq * 86400000);
        p.daysAgo = Math.floor((now - p.lastWatered) / 86400000);
        const fmt = (ts) => ts ? `${new Date(ts).getMonth()+1}/${new Date(ts).getDate()}` : "無";
        p.lastDateFmt = fmt(p.lastWatered);
        p.lastMedFmt = fmt(p.lastMedicated);
        p.lastFertFmt = fmt(p.lastFertilized);
        if (p.selected === undefined) p.selected = false;
    });
    plants.sort((a, b) => b.thirstIndex - a.thirstIndex);
}

/** 3. 圖片處理 **/
async function processImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const temp = document.createElement('canvas');
                temp.width = temp.height = 500;
                const tCtx = temp.getContext('2d');
                const min = Math.min(img.width, img.height);
                tCtx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, 500, 500);
                resolve(temp.toDataURL('image/jpeg', 0.8));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

/** 4. 繪製引擎 **/
function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
    cols = window.innerWidth > 600 ? 3 : 2;
    const padding = 15;
    cardW = (window.innerWidth - (padding * (cols + 1))) / cols;
    cardH = cardW * 1.85; 
    
    // 計算總高度
    const rows = Math.ceil(plants.length / cols);
    const topOffset = 25 + (window.innerHeight > 800 ? 25 : 0);
    totalHeight = topOffset + rows * (cardH + padding) + 120; // 底部留白讓按鈕不遮擋
    
    // 檢查 scrollY 是否超出新界限
    clampScroll();
    render();
}

function clampScroll() {
    const maxScroll = Math.max(0, totalHeight - window.innerHeight);
    if (scrollY > maxScroll) scrollY = maxScroll;
    if (scrollY < 0) scrollY = 0;
}

const imageCache = new Map();

function render() {
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    const padding = 15;
    const topOffset = 25 + (window.innerHeight > 800 ? 25 : 0);
    
    plants.forEach((p, i) => {
        const x = padding + (i % cols) * (cardW + padding);
        // 套用 scrollY 偏移
        const y = topOffset + Math.floor(i / cols) * (cardH + padding) - scrollY;
        p.rect = { x, y, w: cardW, h: cardH };

        // 只繪製在畫面內的卡片以節省效能
        if (y + cardH < 0 || y > window.innerHeight) return;

        // 卡片背景
        ctx.fillStyle = "white";
        ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.06)";
        roundRect(ctx, x, y, cardW, cardH, 20, true);
        ctx.shadowBlur = 0;

        // 圖片
        if(p.imageStr) {
            if(!imageCache.has(p.id)) {
                const img = new Image(); img.src = p.imageStr;
                img.onload = () => { imageCache.set(p.id, img); render(); };
            } else {
                ctx.save();
                ctx.beginPath(); roundRect(ctx, x+10, y+10, cardW-20, cardW-20, 16); ctx.clip();
                ctx.drawImage(imageCache.get(p.id), x+10, y+10, cardW-20, cardW-20);
                ctx.restore();
            }
        }

        // 文字排版
        const textStartX = x + 14;
        const textStartY = y + cardW + 25;
        
        ctx.fillStyle = "#2d3436"; ctx.font = "bold 18px -apple-system";
        ctx.fillText(truncate(p.name, 9), textStartX, textStartY);
        
        ctx.font = "13px -apple-system";
        ctx.fillStyle = p.thirstIndex >= 1 ? "#e74c3c" : "#636e72";
        ctx.fillText(`${p.daysAgo} 天前澆水 (${p.lastDateFmt})`, textStartX, textStartY + 24);
        
        ctx.fillStyle = "#95a5a6";
        ctx.fillText(`💊 施藥: ${p.lastMedFmt}`, textStartX, textStartY + 44);
        ctx.fillText(`✨ 施肥: ${p.lastFertFmt}`, textStartX, textStartY + 64);

        // 缺水標記
        if(p.thirstIndex >= 1) {
            ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath(); ctx.arc(x + 22, y + 22, 11, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 13px Arial"; ctx.textAlign="center";
            ctx.fillText("!", x + 22, y + 27); ctx.textAlign="left";
        }

        // 選取圈圈
        ctx.beginPath(); ctx.arc(x + cardW - 25, y + 25, 14, 0, Math.PI*2);
        ctx.fillStyle = p.selected ? "#3498db" : "rgba(255,255,255,0.9)"; ctx.fill();
        ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2; ctx.stroke();
        if(p.selected) {
            ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign="center";
            ctx.fillText("✓", x + cardW - 25, y + 31); ctx.textAlign="left";
        }

        // 底部按鈕區
        const btnRowY = y + cardH - 38;
        const btnSpacing = cardW / 3;
        
        p.btnWater = { x: x + (btnSpacing*0.5) - 22, y: btnRowY - 22, w: 44, h: 44 };
        p.btnMed = { x: x + (btnSpacing*1.5) - 22, y: btnRowY - 22, w: 44, h: 44 };
        p.btnFert = { x: x + (btnSpacing*2.5) - 22, y: btnRowY - 22, w: 44, h: 44 };

        [p.btnWater, p.btnMed, p.btnFert].forEach((btn, idx) => {
            ctx.fillStyle = "#f1f2f6";
            ctx.beginPath(); ctx.arc(btn.x + 22, btn.y + 22, 20, 0, Math.PI*2); ctx.fill();
            const icon = ["💧", "🧪", "💩"][idx];
            ctx.font = "24px Arial"; ctx.textAlign = "center";
            ctx.fillText(icon, btn.x + 22, btn.y + 30); ctx.textAlign = "left";
        });
    });
}

/** 5. 互動處理 (滑動與點擊) **/

// 處理滾動
canvas.addEventListener('touchstart', e => {
    isDragging = true;
    startY = e.touches[0].pageY;
    lastY = startY;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const currentY = e.touches[0].pageY;
    const delta = lastY - currentY;
    scrollY += delta;
    lastY = currentY;
    clampScroll();
    render();
}, { passive: false });

canvas.addEventListener('touchend', e => {
    isDragging = false;
    // 如果移動距離很小，視為點擊
    if (Math.abs(e.changedTouches[0].pageY - startY) < 5) {
        handleClick(e.changedTouches[0]);
    }
}, { passive: false });

// 支援滑鼠滾動
canvas.addEventListener('mousedown', e => {
    isDragging = true;
    startY = e.pageY;
    lastY = startY;
});

window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const currentY = e.pageY;
    const delta = lastY - currentY;
    scrollY += delta;
    lastY = currentY;
    clampScroll();
    render();
});

window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    isDragging = false;
    if (Math.abs(e.pageY - startY) < 5) {
        handleClick(e);
    }
});

function handleClick(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX || e.pageX) - rect.left;
    const my = (e.clientY || e.pageY) - rect.top; // 這裡不加 scrollY，因為 p.rect 已經包含偏移了
    let hit = false;

    plants.forEach(p => {
        if(dist(mx, my, p.rect.x + p.rect.w - 25, p.rect.y + 25) < 30) {
            p.selected = !p.selected; updateBatchUI(); hit = true;
        } else if(isInside(mx, my, p.btnWater)) {
            snap(); p.lastWatered = Date.now(); saveData(p); processAndSort(); hit = true;
        } else if(isInside(mx, my, p.btnMed)) {
            snap(); p.lastMedicated = Date.now(); saveData(p); processAndSort(); hit = true;
        } else if(isInside(mx, my, p.btnFert)) {
            snap(); p.lastFertilized = Date.now(); saveData(p); processAndSort(); hit = true;
        }
    });
    if(hit) render();
}

/** 6. UI 功能 **/
function openAddModal() { document.getElementById('addModal').style.display='block'; }
function closeModal() { document.getElementById('addModal').style.display='none'; }
function triggerUpload() { fileInput.click(); }
function snap() { lastSnapshot = JSON.parse(JSON.stringify(plants)); document.getElementById('undoBtn').style.display='block'; }

fileInput.onchange = async e => {
    if(!e.target.files[0]) return;
    const name = document.getElementById('plantName').value || "小植物";
    const freq = parseInt(document.getElementById('plantFreq').value) || 3;
    const imgData = await processImage(e.target.files[0]);
    const newP = { id: "p_"+Date.now(), name, freq, imageStr: imgData, lastWatered: Date.now(), lastFertilized: 0, lastMedicated: 0, selected: false };
    plants.push(newP); saveData(newP); processAndSort(); 
    resize(); // 重新計算高度
    closeModal();
    document.getElementById('emptyState').style.display = 'none'; render(); fileInput.value = ""; 
};

function updateBatchUI() {
    const sel = plants.filter(p => p.selected);
    const panel = document.getElementById('batchPanel');
    if(sel.length > 0 || lastSnapshot) {
        panel.style.display = 'flex';
        document.getElementById('batchCount').innerText = `已選取 ${sel.length} 棵植物`;
        document.getElementById('undoBtn').style.display = lastSnapshot ? 'block' : 'none';
    } else panel.style.display = 'none';
}

async function batchWatering() {
    const sel = plants.filter(p => p.selected);
    if (!sel.length) return; snap();
    sel.forEach(p => { p.lastWatered = Date.now(); p.selected = false; });
    await saveMultipleData(sel); processAndSort(); updateBatchUI(); render();
}

function clearSelection() { plants.forEach(p => p.selected = false); updateBatchUI(); render(); }
function undoAction() { if(!lastSnapshot) return; plants = JSON.parse(JSON.stringify(lastSnapshot)); lastSnapshot = null; processAndSort(); updateBatchUI(); render(); showToast("↺ 已復原"); }

function batchDelete() {
    const sel = plants.filter(p => p.selected);
    if(!sel.length) return;
    if(confirm(`確定刪除 ${sel.length} 棵植物？`)) {
        snap();
        sel.forEach(p => deleteFromDB(p.id));
        plants = plants.filter(p => !p.selected);
        if(!plants.length) document.getElementById('emptyState').style.display='block';
        resize(); // 重新計算高度
        updateBatchUI(); render();
    }
}

async function openBatchFreq() {
    const sel = plants.filter(p => p.selected);
    const f = prompt("設定頻率(天):", "7");
    if(f && !isNaN(f)) {
        snap();
        sel.forEach(p => { p.freq = parseInt(f); p.selected = false; });
        await saveMultipleData(sel); processAndSort(); updateBatchUI(); render();
    }
}

/** 工具 **/
function isInside(x, y, r) { return x>=r.x && x<=r.x+r.w && y>=r.y && y<=r.y+r.h; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }
function truncate(s, n) { return s.length > n ? s.substr(0, n-1) + "…" : s; }
function roundRect(ctx, x, y, w, h, r, fill) {
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath(); if (fill) ctx.fill();
}

function showToast(msg) {
    const old = document.querySelector('.toast-msg'); if(old) old.remove();
    const t = document.createElement('div'); t.className='toast-msg';
    t.style = "position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(46, 204, 113, 0.9); color:white; padding:10px 20px; border-radius:30px; z-index:1000; font-weight:bold; pointer-events:none;";
    t.innerText = msg; document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2000);
}

window.onload = async () => { await initDB(); await loadData(); resize(); };
window.onresize = resize;
</script>
</body>
</html>
